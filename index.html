<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajay Kumar - Homepage</title>
  <meta name="description" content="Academic homepage of Ajay Kumar, Research Associate at the University of Minnesota." />
  <style>
    :root {
      --text: #222;
      --muted: #666;
      --border: #e5e5e5;
      --link: #0b63c9;
      --bg: #ffffff;
      --maxw: 1100px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      width: min(var(--maxw), calc(100% - 2rem));
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: #fff;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 0;
    }

    .brand {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }

    main {
      padding: 1.5rem 0 3rem;
    }

    .intro {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 2rem;
      align-items: start;
      margin-bottom: 2rem;
    }

    .profile-box {
      text-align: center;
    }

    .profile-photo {
      width: 200px;
      height: 240px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: #f4f4f4;
      display: block;
      margin: 0 auto 1rem;
    }

    .name {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
    }

    .title, .affil, .location {
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      margin-top: 0.8rem;
    }

    h2 {
      font-size: 1.55rem;
      margin: 2rem 0 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.35rem;
    }

    h3 {
      font-size: 1.1rem;
      margin: 0 0 0.35rem;
    }

    p {
      margin: 0 0 1rem;
    }

    ul {
      margin: 0.2rem 0 1rem 1.25rem;
      padding: 0;
    }

    li {
      margin: 0.45rem 0;
    }

    .news-list li,
    .award-list li,
    .service-list li,
    .edu-list li {
      line-height: 1.6;
    }

    .pub-card {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 1rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
    }

    .pub-card:last-child {
      border-bottom: none;
    }

    .pub-thumb {
      width: 84px;
      height: 84px;
      border: 1px solid var(--border);
      background: #f6f6f6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 0.82rem;
      text-align: center;
      padding: 0.4rem;
    }

    .authors,
    .venue,
    .summary {
      color: var(--muted);
      font-size: 0.97rem;
    }

    .pub-links {
      margin-top: 0.3rem;
      font-size: 0.95rem;
    }

    .pub-links a {
      margin-right: 0.75rem;
    }

    footer {
      border-top: 1px solid var(--border);
      margin-top: 3rem;
      padding-top: 1rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 760px) {
      .intro {
        grid-template-columns: 1fr;
      }

      .profile-box {
        text-align: left;
      }

      .profile-photo {
        margin: 0 0 1rem 0;
      }

      .pub-card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a class="brand" href="#top">Homepage</a>
      <nav class="nav-links">
        <a href="#about">About Me</a>
        <a href="#news">News</a>
        <a href="#publications">Publications</a>
        <a href="#awards">Honors and Awards</a>
        <a href="#education">Education</a>
        <a href="#services">Services</a>
      </nav>
    </div>
  </header>

  <main id="top" class="container">
    <section class="intro">
      <div class="profile-box">
